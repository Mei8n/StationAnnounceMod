name: Bug report
description: バグを発見した場合はこちらからissueを立ててください。
title: "[BUG]"
labels: [bug]
assignees:
  - Mei8n

body:

  - type: textarea
    attributes:
      label: Describe the bug
      description: >
        バグが何であるかについての説明
    validations:
      required: true

  - type: textarea
    attributes:
      label: To Reproduce
      description: >
        動作を再現する手順
      placeholder: >
        1. '...' を設置します。
        2. '....'　をクリックします。
        3. '....'　をします。
        4. エラーが発生します。
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: >
        何が起こると予想したのかについての説明

  - type: textarea
    attributes:
      label: Actual Behavior
      description: >
        必要であればスクリーンショットを添付してください

  - type: textarea
    attributes:
      label: Screenshots
      description: >
        必要であればスクリーンショットを添付してください

  - type: textarea
    attributes:
      label: Crash Reports
      description: >
        クラッシュする場合には、必ずクラッシュレポートを添付してください

  - type: input
    attributes:
      label: OS
      description: あなたの使っている OS とそのバージョンを教えて下さい。 macOS, Windows または GNU/Linux のディストリビューションです。
      placeholder: "macOS 11.4, Windows 10 Home 22H2, Ubuntu 21.04"
    validations:
      required: true

  - type: input
    attributes:
      label: StationAnnounceMod Version
      description: StationAnnounceModのバージョン
      placeholder: "0.1.0-beta"
    validations:
      required: true

  - type: input
    attributes:
      label: Other Mods
      description: 他に導入しているmod
      placeholder: "Optifine"
    validations:
      required: false
